version: '3.8'

services:
  app:
    # Utiliser l'image depuis Docker Hub au lieu de build local
    # Remplacez 'votre-username' par votre nom d'utilisateur Docker Hub
    image: votre-username/laravel-app:latest
    container_name: laravel_app_prod
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./database:/var/www/html/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:p6FRhi2xDkoon5ayy8WhhbIpw3SPRif7+c8+OaYpOjg=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  laravel:
    driver: bridge
