services:
  # Application Web Laravel depuis Docker Hub
  - type: web
    name: cicd-laravel-docker
    runtime: image
    plan: free
    # IMPORTANT : Remplacez 'votre-username' par votre nom d'utilisateur Docker Hub
    image:
      url: docker.io/votre-username/laravel-app:latest
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:p6FRhi2xDkoon5ayy8WhhbIpw3SPRif7+c8+OaYpOjg=
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://cicd-laravel-docker.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
